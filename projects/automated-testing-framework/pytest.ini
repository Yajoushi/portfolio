[pytest]
# Pytest configuration file
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    api: API tests
    ui: UI tests
    slow: Slow running tests
    smoke: Smoke tests
    regression: Regression tests
    sanity: Sanity tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --maxfail=5

# Logging
log_cli = false
log_cli_level = INFO
log_file = logs/test.log
log_file_level = DEBUG

# Timeout for tests (seconds)
timeout = 300
